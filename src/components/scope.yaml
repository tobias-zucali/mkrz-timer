commands:
  - pnpm test:e2e:local -- tests/e2e/timer/actions.spec.ts
rules:
  - match:
      - HelpText
      - QrCodeOverlay
      - Sidebar
      - UrlCopyField
    commands:
      - pnpm test:e2e:local -- tests/e2e/timer/settings.spec.ts
  - match: FloatingTimerContent
    commands:
      - pnpm test:e2e:remote -- tests/e2e/live-session/pip.spec.ts
  - match: ServiceWorkerRegistration
    commands:
      - pnpm test:e2e:local -- tests/e2e/timer/pwa.spec.ts
