- dialog "Welcome to mkrz timer":
  - button "Close dialog"
  - paragraph: First use
  - heading "Welcome to mkrz timer" [level=2]
  - button "Close dialog"
  - paragraph: A collaborative timer focused on simple sharing, synchronization, and distraction-free usage.
  - paragraph:
    - text: mkrz timer is a personal side project by Tobias Zucali, Co-Founder of
    - link "mkrz lab":
      - /url: https://www.mkrz.at/
    - text: ", created to support workshops, facilitation, and collaborative group processes."
  - heading "Quick start" [level=2]
  - list:
    - listitem: Start a timer directly in your browser
    - listitem: Share sessions with participants or other devices
    - listitem: Use synchronized remote sessions across devices
    - listitem: Use the timer locally without creating an account
  - heading "Local-only usage" [level=2]
  - paragraph: "In local-only mode:"
  - list:
    - listitem: timer data stays on your device
    - listitem: no timer information is sent to any server
    - listitem: no account is required
  - heading "Remote sessions" [level=2]
  - paragraph: Live-session mode allows multiple devices and participants to stay synchronized through the relay service. The current implementation uses generated control and readonly access links rather than a verified email address.
  - heading "Open source and free usage" [level=2]
  - paragraph:
    - text: mkrz timer is free to use and open for contributions. If you find the project useful, consider following the work of
    - link "mkrz lab":
      - /url: https://www.mkrz.at/
    - text: through our public channels.
  - checkbox "Don't show this welcome again on this device."
  - text: Don't show this welcome again on this device.
  - button "Use the timer!"