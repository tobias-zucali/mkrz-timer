  - article:
    - heading "Terms of Use" [level=1]
    - paragraph:
      - text: mkrz timer is a personal side project by Tobias Zucali, Co-Founder of
      - link "mkrz lab":
        - /url: https://www.mkrz.at/
      - text: .
    - paragraph: The project is intended to support workshops, facilitation, collaborative processes, learning environments, and other shared activities through a simple and accessible timer experience.
    - paragraph: By using the hosted version of the application, you agree to these terms.
    - heading "Free usage" [level=2]
    - paragraph: mkrz timer is provided free of charge.
    - paragraph: The project is intended for personal, educational, community, workshop, and non-commercial usage.
    - paragraph:
      - text: Commercial usage of the hosted service or source code may require additional permission. Please
      - link "contact us":
        - /url: mailto:timer@mkrz.at
      - text: if you are interested in collaboration or commercial usage.
    - heading "Open source and licensing" [level=2]
    - paragraph:
      - text: The source code of the project is publicly available on
      - link "GitHub":
        - /url: https://github.com/tobias-zucali/mkrz-timer
      - text: .
    - paragraph: The project is licensed under the Creative Commons Attribution-NonCommercial 4.0 International license.
    - paragraph: Please refer to the LICENSE file and repository documentation for details.
    - heading "Local and remote usage" [level=2]
    - paragraph: mkrz timer supports both local-only usage and synchronized live sessions.
    - paragraph: In local-only mode, timer data remains on your device.
    - paragraph: Live sessions depend on the relay service and synchronization infrastructure. Availability, performance, or long-term persistence of live sessions cannot be guaranteed.
    - heading "Responsible usage" [level=2]
    - paragraph: Please use the service responsibly.
    - paragraph: "You agree not to:"
    - list:
      - listitem: intentionally disrupt or misuse the synchronization infrastructure
      - listitem: attempt unauthorized access to systems or sessions
      - listitem: use the service for illegal activities
      - listitem: interfere with the availability or stability of the hosted service
    - heading "Availability and warranty" [level=2]
    - paragraph: The project is provided “as is” without guarantees of availability, uptime, reliability, or fitness for a particular purpose.
    - paragraph: Features, infrastructure, and functionality may change over time.
    - paragraph: While we aim to provide a stable and accessible experience, interruptions or technical issues may occur.
    - heading "Privacy" [level=2]
    - paragraph:
      - text: Information about local storage, synchronized sessions, and privacy-related behavior is available on the
      - link "Privacy":
        - /url: /en/privacy
      - text: page.
    - heading "Collaboration" [level=2]
    - paragraph: We are always happy to hear from people using the timer in workshops, facilitation settings, educational contexts, collaborative processes, and creative projects.
    - paragraph: If you are interested in collaboration, workshops, facilitation support, creative technology projects, or commercial inquiries, feel free to reach out.
    - heading "Contact" [level=2]
    - paragraph: "For questions about these terms, collaboration requests, or commercial inquiries:"
    - paragraph:
      - text: /mkrz lab OG – Tobias Zucali Peter-Behrens-Platz 3 \d+ Linz/
