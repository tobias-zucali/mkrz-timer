- main:
  - link "mkrz timer":
    - /url: /en
  - article:
    - heading "Privacy" [level=1]
    - paragraph:
      - text: mkrz timer is a personal side project by Tobias Zucali, Co-Founder of
      - link "mkrz lab":
        - /url: https://www.mkrz.at/
      - text: .
    - paragraph: This page explains how local-only usage and live sessions work in the current implementation, which information may be stored in your browser, and how the relay currently handles synchronized sessions.
    - paragraph: We aim to keep the project privacy-conscious, transparent, and understandable.
    - heading "Local-only usage" [level=2]
    - paragraph: mkrz timer can be used directly in the browser without creating an account.
    - paragraph: "In local-only mode:"
    - list:
      - listitem: timer state remains in your browser unless you share a link
      - listitem: no timer information is synchronized with the live-session relay
      - listitem: no account is required
      - listitem: no remote session is created
    - paragraph: "Depending on the features you use, the application may store a small amount of information in `localStorage`."
    - paragraph: "In the current implementation, this includes:"
    - list:
      - listitem: "recent and current local timer snapshots in `timer.localLibrary`"
      - listitem: "the share-panel preference in `timer.share.includeVoiceSoundSettings`"
      - listitem: "the welcome-banner dismissal flag in `timer.welcomeBanner.v1.dismissed`"
    - paragraph: "We do not currently use browser cookies for the timer itself, and we do not currently use `sessionStorage` for the timer state described on this page."
    - paragraph: In local-only mode, this information remains on your device unless you intentionally share a URL.
    - heading "Live synchronized sessions" [level=2]
    - paragraph: mkrz timer also supports synchronized live sessions that allow multiple devices or participants to stay in sync.
    - paragraph: "When live synchronization is used:"
    - list:
      - listitem: timer state is synchronized through the relay service
      - listitem: separate control and readonly access links are created
      - listitem: the access tokens are part of the shared URLs
      - listitem: participants opening the same session can see synchronized timer changes
    - paragraph: The current implementation does **not** use a verified email address as the session key.
    - paragraph: "Instead, the live-session system uses:"
    - list:
      - listitem: a generated session id
      - listitem: a generated control token
      - listitem: a generated readonly token
    - paragraph: These values are treated as access credentials. They may appear in browser history, copied links, chat messages, emails, or other places where you intentionally share the URL.
    - paragraph: "The client currently keeps live-session state in memory while the page is open. The application does not currently store live-session access tokens in browser `localStorage`."
    - heading "Server-side live-session handling" [level=2]
    - paragraph: The current relay implementation keeps live-session data in server memory.
    - paragraph: "This currently includes:"
    - list:
      - listitem: the canonical synchronized timer snapshot
      - listitem: the participant list for connected clients
      - listitem: the generated access tokens
      - listitem: in-memory recovery metadata used to rebuild control sessions after disconnects or relay restarts
    - paragraph: Active sessions are removed from the active-session map after an inactivity timeout.
    - paragraph: The current implementation does not write the live-session snapshot to a dedicated database in normal operation.
    - paragraph: The relay health endpoint and server process may still expose or create ordinary operational data such as logs, error output, and connection diagnostics needed to run and debug the service.
    - paragraph: Because the current recovery metadata also lives in server memory, some live-session metadata may remain in memory until the relay process restarts, even after an active session has ended.
    - heading "Infrastructure and hosting" [level=2]
    - paragraph: The project infrastructure is currently hosted within the European Union.
    - paragraph: The server infrastructure is currently operated in Frankfurt, Germany.
    - paragraph: Applicable Austrian and European Union privacy regulations, including GDPR/DSGVO requirements, are intended to apply where relevant.
    - heading "Third-party services" [level=2]
    - paragraph: The hosted application may depend on infrastructure providers or technical services required to operate the relay and hosting setup.
    - paragraph: At the time of writing, this includes hosting infrastructure provided through Hetzner.
    - heading "No advertising or tracking focus" [level=2]
    - paragraph: The project is not intended as an advertising or behavioral tracking platform.
    - paragraph: We currently do not aim to build user profiles, behavioral analytics systems, or advertising personalization systems around the application.
    - heading "Open source transparency" [level=2]
    - paragraph: "The source code of the project is publicly available:"
    - list:
      - listitem:
        - link "GitHub repository":
          - /url: https://github.com/tobias-zucali/mkrz-timer
    - paragraph: The open-source nature of the project is intended to make technical behavior more transparent and reviewable.
    - heading "Your choices" [level=2]
    - paragraph: "You can:"
    - list:
      - listitem: use the application locally without starting a live session
      - listitem: avoid creating or joining synchronized sessions
      - listitem: clear browser storage locally through your browser settings
      - listitem: stop using the hosted service at any time
    - heading "Changes" [level=2]
    - paragraph: This privacy page may evolve together with the project and its infrastructure.
    - paragraph: Changes to synchronization behavior, storage handling, or infrastructure may result in updates to this page.
    - heading "Contact" [level=2]
    - paragraph: "For privacy-related questions, accessibility concerns, collaboration inquiries, or general feedback:"
    - paragraph:
      - text: /mkrz lab OG – Tobias Zucali Peter-Behrens-Platz 3 \d+ Linz Austria/
      - link "timer@mkrz.at":
        - /url: mailto:timer@mkrz.at
