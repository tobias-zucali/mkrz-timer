name: Build and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "hetzner-deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test:ci

      - name: Build
        run: pnpm build

      - name: Create deployment bundle
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='README.md' \
            --exclude='docs' \
            --exclude='playwright.*' \
            --exclude='test*' \
            -czf /tmp/deploy.tar.gz .
          mv /tmp/deploy.tar.gz deploy.tar.gz

      - name: Upload deployment bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/srv/mkrz-timer"
          overwrite: true

      - name: Restart remote stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: DEPLOY_BUNDLE_PATH,DEPLOY_COMMIT,NEXT_PUBLIC_REMOTE_WS_URL,RELAY_SESSION_TTL_MS,RELAY_PORT,TIME_DOMAIN,TIME_RELAY_DOMAIN
          script: |
            cd /srv/mkrz-timer
            deploy_extract_dir="$(mktemp -d)"
            trap 'rm -rf "$deploy_extract_dir"' EXIT
            tar -xzf deploy.tar.gz -C "$deploy_extract_dir"
            chmod +x "$deploy_extract_dir/scripts/deploy-production.sh"
            "$deploy_extract_dir/scripts/deploy-production.sh"
        env:
          DEPLOY_BUNDLE_PATH: /srv/mkrz-timer/deploy.tar.gz
          DEPLOY_COMMIT: ${{ github.sha }}
          NEXT_PUBLIC_REMOTE_WS_URL: ${{ secrets.NEXT_PUBLIC_REMOTE_WS_URL || 'wss://ws.timer.mkrz.at/ws' }}
          RELAY_SESSION_TTL_MS: ${{ secrets.RELAY_SESSION_TTL_MS || '300000' }}
          RELAY_PORT: ${{ secrets.RELAY_PORT || '9100' }}
          TIME_DOMAIN: ${{ secrets.TIME_DOMAIN || 'timer.mkrz.at' }}
          TIME_RELAY_DOMAIN: ${{ secrets.TIME_RELAY_DOMAIN || 'ws.timer.mkrz.at' }}
